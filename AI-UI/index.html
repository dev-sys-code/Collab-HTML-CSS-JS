<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&"/>
        <title>ChatBOT</title>
    </head>
    <body>
        <main>
            <div class="above-chat-view-text">
                <h1>ChatBOT 5.1</h1>
            </div>
            <div class="chat-view">
                <label class="human">hi</label>
                <label class="ai">Hello 👋 How can I help you today?</label>
                <label class="human">we need to fill the chat up</label>
                <label class="ai">Okay! Let's do it.</label>
                <label class="human">what could we say</label>
                <label class="ai">I'm not sure...</label>
                <label class="human">gonna yap</label>
                <label class="ai">Great choice!</label>
                <label class="human">yap</label>
                <label class="ai">Ok! 🔥</label>
                <label class="human">yappy</label>
                <label class="ai">So. What should we talk about?</label>
                <label class="human">idk</label>
                <label class="ai">Haha! Good one</label>    
            </div>
            <div class="send-msgs">
                <label class="box">
                    <input type="text" placeholder="Send a message">
                </label>
                <div class="buttons">
                    <label class="btn"><span class="material-symbols-outlined">add_a_photo</span></label> <!--Photo-->
                    <label class="btn"><span class="material-symbols-outlined">graph_6</span></label> <!--Model-->
                    <label class="btn"><span class="material-symbols-outlined">search</span></label> <!--Deep Research-->
                </div>
            </div>
        </main>
    </body>
</html>
