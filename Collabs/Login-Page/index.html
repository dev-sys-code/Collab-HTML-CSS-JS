<!DOCTYPE html>
<html>
    <head>
        <title>Login Page</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main>
            <h1>Login</h1>
            <form>
                <div class="inputs">
                    <label class="input-lbls">
                        Username
                        <input class="txt-inpts" type="text">
                    </label>
                    <label class="input-lbls">
                        Password
                        <input class="txt-inpts" type="password">
                    </label>
                    <div class="input-output-mixed">
                        <label>
                            <input type="checkbox">
                            Remember me
                        </label>
                        <a href="#">Forgot password?</a>
                    </div>
                </div>
                <div class="login-btn">
                    <button class="individual-button">Login</button>
                </div>
                <h3>or</h3>
                <div class="external-logins">
                    <div class="external-login-individual-div">
                        <img src="https://www.shareicon.net/data/2016/07/10/119930_google_512x512.png" height="25">
                        <a href="#" class="external-login-individual-button">Sign in with Google</a>
                    </div>
                    <div class="external-login-individual-div">
                        <img src="https://avatars.githubusercontent.com/u/31075795?s=280&v=4" height="25">
                        <a href="#" class="external-login-individual-button">Sign in with Microsoft</a>
                    </div>
                </div>
                <p class="no-account-register">No account? <strong>Register</strong></p>
            </form>
        </main>
    </body>
</html>
